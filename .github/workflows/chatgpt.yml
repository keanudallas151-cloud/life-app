name: ChatGPT Integration

on:
  workflow_dispatch:

jobs:
  chatgpt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get ChatGPT completion
        id: chatgpt
        uses: cahaseler/openai-api@v1.0.0
        with:
          apiKey: ${{ secrets.OPENAI_API_KEY }}
          prompt: "Write a summary of the latest commit in this repository."
          input: "Summarize the latest commit clearly and briefly."
          model: "gpt-4"
